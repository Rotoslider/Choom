use_default_settings:
  engines:
    keep_only:
      # -- General web search --
      - google
      - duckduckgo
      - brave
      - startpage
      - mojeek
      - yahoo
      - bing
      # -- News --
      - google news
      - duckduckgo news
      - bing news
      - brave.news
      # -- Images --
      - google images
      - duckduckgo images
      - bing images
      - brave.images
      - unsplash
      - pexels
      # -- Videos --
      - google videos
      - duckduckgo videos
      - bing videos
      - youtube
      - vimeo
      # -- Science / academic --
      - arxiv
      - google scholar
      - pubmed
      - semantic scholar
      # -- Code / tech --
      - github
      - stackoverflow
      - superuser
      - npm
      - pypi
      - crates.io
      - mdn
      # -- Reference --
      - wikipedia
      - wiktionary
      # -- Other useful --
      - reddit
      - hackernews
      - imdb
      - openstreetmap
      - currency
      - wolframalpha

general:
  instance_name: "Choom SearXNG"
  debug: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  # CRITICAL: json format needed for Choom API access
  formats:
    - html
    - json

server:
  port: 8888
  bind_address: "127.0.0.1"
  secret_key: "choom-searxng-local-instance"
  limiter: false
  public_instance: false
  image_proxy: false
